name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for unreleased changes
        id: check
        run: |
          if python scripts/release.py --dry-run > /dev/null 2>&1; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release script
        if: steps.check.outputs.has_changes == 'true'
        run: python scripts/release.py

      - name: Get new version
        if: steps.check.outputs.has_changes == 'true'
        id: version
        run: |
          python -c "
          import re, pathlib
          text = pathlib.Path('qcal/__init__.py').read_text()
          m = re.search(r'__version__\s*=\s*\"([^\"]+)\"', text)
          print('version=' + m.group(1))
          " >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        if: steps.check.outputs.has_changes == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'EOF'
          import re, pathlib, os
          version = os.environ["VERSION"]
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, changelog, re.DOTALL)
          notes = m.group(1).strip() if m else ""
          pathlib.Path("release_notes.md").write_text(notes, encoding="utf-8")
          EOF

      - name: Commit and tag
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md qcal/__init__.py
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push --follow-tags

      - name: Create GitHub Release
        if: steps.check.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
